<!DOCTYPE html>
<html class="body-wrapper layout-timeline" lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>{name} - Resume</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>{{template_css}}</style>
    </head>

    <body>
        <main class="resume resume-timeline-layout">
            <header class="resume-header resume-header--timeline">
                <h1 class="name">{name}</h1>
                {tagline_block}
            </header>

            <div class="timeline-body">
                <aside class="timeline-left">
                    {timeline_left}
                </aside>
                <div class="timeline-main">
                    {sections}
                </div>
            </div>
        </main>
    </body>
</html>
